name: Deploy to Porkbun

# Publishes the site to Porkbun Static Hosting over FTP on every push to main.
# Requires one repo secret: FTP_PASSWORD (the Porkbun Static Hosting FTP password).
# Manual runs: Actions tab -> "Deploy to Porkbun" -> Run workflow.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: porkbun-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: pixie-ss1-ftp.porkbun.com
          username: mikeside.com
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          server-dir: ./
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            README.md
            .gitattributes
